<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Smart Editor&#8482; WYSIWYG Mode</title>
</head>
<body class="se2_inputarea" style="height:0;-webkit-nbsp-mode:normal"></body>
<script>
(function(){
  try {
    document.designMode = 'on';
    if (document.body) {
      document.body.setAttribute('contenteditable', 'true');
      document.body.contentEditable = 'true';
      setTimeout(function(){ try { document.body.focus(); } catch(e){} }, 50);
    }
    window.addEventListener('mousedown', function(){ try { document.body && document.body.focus(); } catch(e){} });
  } catch(e) {}
})();
</script>
<script type="text/javascript">
(function(){
  var DBG = '[PASTE-INLINE]';
  function log() { var a = [DBG]; for(var i=0;i<arguments.length;i++) a.push(arguments[i]); console.log.apply(console, a); }
  function warn() { var a = [DBG]; for(var i=0;i<arguments.length;i++) a.push(arguments[i]); console.warn.apply(console, a); }

  var BUSY = false;

  function insertHTML(html) {
    try {
      document.execCommand('insertHTML', false, html);
    } catch(e) {
      try {
        var sel = window.getSelection();
        if (sel && sel.rangeCount > 0) {
          var range = sel.getRangeAt(0);
          range.deleteContents();
          var frag = range.createContextualFragment(html);
          range.insertNode(frag);
          range.collapse(false);
        }
      } catch(e2) { warn('insertHTML failed', e2); }
    }
  }

  var MAX_RETRY = 10;       // 최대 10회 재시도
  var RETRY_DELAY_MS = 1500; // 재시도 간격 1.5초

  function delay(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  function uploadDataUrl(dataUrl) {
    var attempt = 0;
    function tryOnce() {
      attempt++;
      return fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dataUrl: dataUrl })
      }).then(function(r){
          // 4xx 클라이언트 에러는 즉시 실패 — retry 무의미 (Cloudinary 400 등)
          if (r.status >= 400 && r.status < 500) {
            warn('upload attempt', attempt, 'HTTP', r.status, '— client error, no retry');
            return { __noRetry: true, url: null };
          }
          // 5xx 서버 에러는 retry 대상
          if (!r.ok && attempt < MAX_RETRY) {
            warn('upload attempt', attempt, 'HTTP', r.status, '— server error, retrying');
            return delay(RETRY_DELAY_MS).then(tryOnce);
          }
          return r.json();
        })
        .then(function(j) {
          if (!j || j.__noRetry) return { url: null }; // 4xx or null — no retry, immediate fail
          if (j && j.url) return j;
          // url 없는 응답 → retry (5xx 후 빈 응답 등)
          if (attempt < MAX_RETRY) {
            warn('upload attempt', attempt, 'no url, retrying in', RETRY_DELAY_MS, 'ms');
            return delay(RETRY_DELAY_MS).then(tryOnce);
          }
          return j;
        })
        .catch(function(e) {
          // 네트워크 에러만 retry
          if (attempt < MAX_RETRY) {
            warn('upload attempt', attempt, 'network error:', e.message, '— retrying in', RETRY_DELAY_MS, 'ms');
            return delay(RETRY_DELAY_MS).then(tryOnce);
          }
          throw e;
        });
    }
    return tryOnce();
  }

  function uploadBlob(blob, name) {
    var attempt = 0;
    function tryOnce() {
      attempt++;
      var form = new FormData();
      form.append('file', blob, name || 'pasted.png');
      return fetch('/api/upload', { method: 'POST', body: form })
        .then(function(r){
          if (r.status >= 400 && r.status < 500) {
            warn('blob upload attempt', attempt, 'HTTP', r.status, '— client error, no retry');
            return r.json().catch(function(){ return null; });
          }
          if (!r.ok && attempt < MAX_RETRY) {
            warn('blob upload attempt', attempt, 'HTTP', r.status, '— retrying');
            return delay(RETRY_DELAY_MS).then(tryOnce);
          }
          return r.json();
        })
        .then(function(j) {
          if (!j) return j;
          if (j && j.url) return j;
          if (attempt < MAX_RETRY) {
            warn('blob upload attempt', attempt, 'no url, retrying');
            return delay(RETRY_DELAY_MS).then(tryOnce);
          }
          return j;
        })
        .catch(function(e) {
          if (attempt < MAX_RETRY) {
            warn('blob upload attempt', attempt, 'network error:', e.message, '— retrying');
            return delay(RETRY_DELAY_MS).then(tryOnce);
          }
          throw e;
        });
    }
    return tryOnce();
  }

  // file:/// URL → 서버에서 로컬 파일 직접 업로드 (HWP temp 파일)
  function uploadFilePath(fileUrl) {
    // file:///C:/Users/.../Temp/tmpXXXX.jpg → C:\Users\...\Temp\tmpXXXX.jpg
    var filePath = fileUrl.replace(/^file:\/\/\//i, '').replace(/\//g, '\\');
    // URL decode
    try { filePath = decodeURIComponent(filePath); } catch(e){}
    log('uploading local file:', filePath);
    return fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filePath: filePath })
    }).then(function(r){
      if (r.status >= 400 && r.status < 500) {
        warn('filePath upload HTTP', r.status, '— no retry');
        return { url: null };
      }
      return r.json();
    }).catch(function(e){
      warn('filePath upload error:', e.message);
      return { url: null };
    });
  }

  // Extract data:image URLs from HTML string
  function collectDataUrls(html) {
    if (!html) return [];
    var re = /(data:image\/[a-zA-Z0-9.+-]+;base64,[A-Za-z0-9+/=]+)/g;
    var found = html.match(re) || [];
    var unique = [];
    var seen = {};
    for (var i = 0; i < found.length; i++) {
      if (!seen[found[i]]) { unique.push(found[i]); seen[found[i]] = true; }
    }
    return unique;
  }

  // Extract images from RTF \pict blocks — indexOf 기반 (55MB+ 대용량 RTF 대응)
  function collectFromRTF(rtf) {
    try {
      if (!rtf) return [];
      var searchKey = '\\pict';
      var firstPict = rtf.indexOf(searchKey);
      if (firstPict === -1) { log('RTF: no \\pict found in', rtf.length, 'bytes'); return []; }
      log('RTF: parsing', rtf.length, 'bytes, first \\pict at', firstPict);

      var out = [];
      var pos = firstPict;
      var maxImages = 50; // safety limit

      while (pos !== -1 && out.length < maxImages) {
        // Find the header area (control words before hex data)
        // Look ahead up to 500 chars for format flags
        var headerEnd = Math.min(pos + 500, rtf.length);
        var header = rtf.substring(pos, headerEnd);

        var isPng = header.indexOf('\\pngblip') !== -1;
        var isJpg = header.indexOf('\\jpegblip') !== -1 || header.indexOf('\\jpgblip') !== -1;
        var isEmf = header.indexOf('\\emfblip') !== -1;
        var isWmf = header.indexOf('\\wmetafile') !== -1;

        if (!isPng && !isJpg && !isEmf && !isWmf) {
          log('RTF: skipping \\pict at', pos, '(unknown format)');
          pos = rtf.indexOf(searchKey, pos + 5);
          continue;
        }

        var mime = isPng ? 'image/png' : (isJpg ? 'image/jpeg' : 'image/png'); // EMF/WMF → treat as png for now

        // Find start of hex data: skip control words, find first run of hex chars
        // The hex data starts after the last control word (\\xxx or space)
        var hexStart = pos + 5; // skip \pict
        // Skip control words
        while (hexStart < rtf.length) {
          if (rtf[hexStart] === '\\') {
            // skip control word
            hexStart++;
            while (hexStart < rtf.length && rtf[hexStart] !== ' ' && rtf[hexStart] !== '\\' && rtf[hexStart] !== '\n' && rtf[hexStart] !== '\r' && rtf[hexStart] !== '}') hexStart++;
            if (hexStart < rtf.length && rtf[hexStart] === ' ') hexStart++; // skip trailing space
          } else if (rtf[hexStart] === ' ' || rtf[hexStart] === '\n' || rtf[hexStart] === '\r') {
            hexStart++;
          } else {
            break; // start of hex data
          }
        }

        // Collect hex chars until } (matching brace)
        var depth = 0;
        var hexChars = [];
        var ci = hexStart;
        while (ci < rtf.length) {
          var ch = rtf[ci];
          if (ch === '{') { depth++; ci++; continue; }
          if (ch === '}') {
            if (depth > 0) { depth--; ci++; continue; }
            break; // matching close brace
          }
          // Collect only hex characters
          if ((ch >= '0' && ch <= '9') || (ch >= 'a' && ch <= 'f') || (ch >= 'A' && ch <= 'F')) {
            hexChars.push(ch);
          }
          ci++;
        }

        var hex = hexChars.join('');
        log('RTF: \\pict at', pos, 'format:', isPng?'png':isJpg?'jpg':isEmf?'emf':'wmf', 'hex bytes:', hex.length/2);

        if (hex.length >= 80) { // at least 40 bytes
          // Convert hex to base64
          var bytes = new Uint8Array(hex.length / 2);
          for (var i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substr(i, 2), 16);

          if (bytes.length >= 512) {
            // For EMF/WMF: detect actual format from magic bytes
            if (isEmf || isWmf) {
              // Check if it's actually JPEG (starts with FF D8 FF)
              if (bytes[0] === 0xFF && bytes[1] === 0xD8 && bytes[2] === 0xFF) {
                mime = 'image/jpeg';
              }
              // Check PNG magic (89 50 4E 47)
              else if (bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4E && bytes[3] === 0x47) {
                mime = 'image/png';
              }
              else {
                // 순수 WMF/EMF 바이너리 — 브라우저/Cloudinary 미지원, skip
                log('RTF: WMF/EMF at', pos, '— not uploadable (magic bytes mismatch), skip');
                pos = rtf.indexOf(searchKey, ci > pos ? ci : pos + 5);
                continue;
              }
            }
            // Convert to base64 in chunks to avoid stack overflow
            var binParts = [];
            for (var j = 0; j < bytes.length; j += 8192) {
              var chunk = bytes.subarray(j, Math.min(j + 8192, bytes.length));
              var str = '';
              for (var k = 0; k < chunk.length; k++) str += String.fromCharCode(chunk[k]);
              binParts.push(str);
            }
            var b64 = btoa(binParts.join(''));
            if (b64) {
              out.push('data:' + mime + ';base64,' + b64);
              log('RTF: extracted image', out.length, '(' + mime + ',', bytes.length, 'bytes)');
            }
          }
        }

        // Find next \pict
        pos = rtf.indexOf(searchKey, ci > pos ? ci : pos + 5);
      }
      log('RTF: total extracted', out.length, 'images');
      return out;
    } catch(e) { warn('collectFromRTF error', e); return []; }
  }

  // Extract from HWP JSON comment embedded in HTML
  // HTML 순서 기반 매핑: fn(파일명) 필드로 file:/// URL 순서와 1:1 매핑
  function collectFromHwpJson(html) {
    try {
      var m = html && html.match(/<!--\[data-hwpjson\]\s*(\{[\s\S]*?\})\s*-->/i);
      if (!m) return [];
      var root = JSON.parse(m[1]);
      var bidt = {};
      var fnToBi = {}; // 파일명 → bi key 매핑 (HTML 순서 기반 정렬용)
      var srOrder = []; // JSON DFS 순서 (fallback)

      var collect = function(obj) {
        if (!obj || typeof obj !== 'object') return;
        if (obj.bidt && typeof obj.bidt === 'object') {
          for (var k in obj.bidt) {
            if (typeof obj.bidt[k] === 'string' && obj.bidt[k].length > 50) bidt[k] = obj.bidt[k];
          }
        }
        // bi 참조 수집 (fn 파일명 포함)
        if (typeof obj.bi === 'string') {
          srOrder.push(obj.bi);
          // fn 필드: HWP가 생성하는 파일명 (EMBxxxxxxxx.jpg 등)
          var fn = obj.fn || obj.name || obj.fileName || null;
          if (fn) { fnToBi[fn.split('/').pop().split('\\').pop()] = obj.bi; }
        }
        if (Array.isArray(obj.bi)) {
          for (var i = 0; i < obj.bi.length; i++) {
            var it = obj.bi[i];
            if (it && typeof it.sr === 'string') {
              srOrder.push(it.sr);
              var fn2 = it.fn || it.name || it.fileName || null;
              if (fn2) { fnToBi[fn2.split('/').pop().split('\\').pop()] = it.sr; }
            }
          }
        }
        for (var key in obj) if (Object.prototype.hasOwnProperty.call(obj, key)) collect(obj[key]);
      };
      collect(root);

      var bidtKeys = Object.keys(bidt);
      var fnKeys = Object.keys(fnToBi);
      log('HWP JSON: bidt keys:', bidtKeys.length, '| srOrder:', srOrder.length, '| fnToBi:', fnKeys.length);

      // HTML에서 file:/// URL 순서 추출
      var htmlFileNames = [];
      var fre = /<img\b[^>]*\bsrc\s*=\s*["']?(file:\/\/\/[^"'>\s]+)/gi;
      var fu;
      while ((fu = fre.exec(html)) !== null) {
        htmlFileNames.push(fu[1].split('/').pop());
      }
      log('HWP JSON: htmlFileNames:', htmlFileNames.length, fnKeys.length > 0 ? '→ fn매핑 사용' : '→ JSON순서 fallback');

      var dataUrls = [];
      if (htmlFileNames.length > 0 && fnKeys.length > 0) {
        // fn 매핑 기반: HTML 파일명 순서로 bi key 조회
        var missing = [];
        for (var fi = 0; fi < htmlFileNames.length; fi++) {
          var htmlFn = htmlFileNames[fi];
          var biKey = fnToBi[htmlFn];
          if (!biKey) {
            // 부분 매칭 (tmpXXXX.jpg 등은 fn 없을 수 있음)
            for (var fk in fnToBi) {
              if (htmlFn.indexOf(fk) !== -1 || fk.indexOf(htmlFn) !== -1) { biKey = fnToBi[fk]; break; }
            }
          }
          var b64 = biKey ? bidt[biKey] : null;
          if (b64) {
            dataUrls.push('data:image/png;base64,' + b64);
          } else {
            dataUrls.push(null); // 매핑 실패 → filePath fallback에서 처리
            missing.push(htmlFn + '(biKey=' + (biKey || 'none') + ')');
          }
        }
        if (missing.length > 0) warn('HWP JSON fn-mapped missing:', missing.length, missing.slice(0,5));
      } else {
        // fn 필드 없음 — JSON DFS 순서로 fallback
        log('HWP JSON: fn 필드 없음, JSON DFS 순서 사용');
        for (var si = 0; si < srOrder.length; si++) {
          var b64f = bidt[srOrder[si]];
          if (b64f) dataUrls.push('data:image/png;base64,' + b64f);
          else { dataUrls.push(null); warn('HWP JSON: missing bidt for', srOrder[si]); }
        }
      }

      var valid = dataUrls.filter(function(x){ return x !== null; }).length;
      log('HWP JSON: total', dataUrls.length, 'slots,', valid, 'valid');
      return dataUrls;
    } catch(e) { warn('HWP JSON parse error:', e); return []; }
  }

  // Show overlay while uploading (inside iframe)
  function showOverlay(msg) {
    var ov = document.createElement('div');
    ov.id = '__paste_overlay';
    ov.style.cssText = 'position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;z-index:999999;font-family:sans-serif;font-size:14px;';
    ov.innerHTML = '<div style="padding:16px 20px;background:#fff;border:1px solid #ddd;border-radius:8px;font-weight:600;">' + (msg || 'uploading...') + '</div>';
    document.body.appendChild(ov);
    // 외부(editor-v2.ejs) 프로그레스바도 표시
    topProgress.show(msg);
    return ov;
  }
  function removeOverlay() {
    var ov = document.getElementById('__paste_overlay');
    if (ov) ov.remove();
    topProgress.hide();
  }

  // ── window.top 프로그레스바 연동 (editor-v2.ejs #save-progress-wrap) ──
  var topProgress = {
    _top: function() {
      try { return window.top.document; } catch(e) { return null; }
    },
    show: function(msg) {
      var d = this._top(); if (!d) return;
      try {
        var wrap = d.getElementById('save-progress-wrap');
        if (wrap) wrap.style.display = 'block';
        var label = d.getElementById('save-progress-label');
        if (label) label.textContent = msg || '이미지 업로드 중…';
        var bar = d.getElementById('save-progress-bar-inner');
        if (bar) bar.style.width = '0%';
        var detail = d.getElementById('save-progress-detail');
        if (detail) detail.textContent = '';
        var btn = d.getElementById('save-btn');
        if (btn) btn.disabled = true;
        // PASTE_BUSY 플래그 설정
        try { window.top.PASTE_BUSY = true; } catch(e2){}
      } catch(e) { warn('topProgress.show error', e); }
    },
    update: function(current, total, successCount, failCount) {
      var d = this._top(); if (!d) return;
      try {
        var pct = total > 0 ? Math.round((current / total) * 100) : 0;
        var bar = d.getElementById('save-progress-bar-inner');
        if (bar) bar.style.width = pct + '%';
        var label = d.getElementById('save-progress-label');
        if (label) label.textContent = '이미지 업로드 중… ' + current + ' / ' + total + '개 (' + pct + '%)';
        var detail = d.getElementById('save-progress-detail');
        var f = typeof failCount === 'number' ? failCount : 0;
        if (detail) detail.textContent = '성공 ' + successCount + '건' + (f > 0 ? ' / 실패 ' + f + '건' : '');
      } catch(e) { warn('topProgress.update error', e); }
    },
    done: function(total, success, fail) {
      var d = this._top(); if (!d) return;
      try {
        var bar = d.getElementById('save-progress-bar-inner');
        if (bar) bar.style.width = '100%';
        var label = d.getElementById('save-progress-label');
        if (label) label.textContent = '업로드 완료 — ' + success + ' / ' + total + '개 성공' + (fail > 0 ? ' (실패 ' + fail + '건)' : '');
        var detail = d.getElementById('save-progress-detail');
        if (detail) detail.textContent = fail > 0 ? '⚠️ ' + fail + '개 이미지 업로드 실패' : '✅ 전체 업로드 성공';
        // 3초 후 자동 숨김
        setTimeout(function() { topProgress.hide(); }, 3000);
        try { window.top.PASTE_BUSY = false; } catch(e2){}
      } catch(e) { warn('topProgress.done error', e); }
    },
    hide: function() {
      var d = this._top(); if (!d) return;
      try {
        var wrap = d.getElementById('save-progress-wrap');
        if (wrap) wrap.style.display = 'none';
        var btn = d.getElementById('save-btn');
        if (btn) btn.disabled = false;
        try { window.top.PASTE_BUSY = false; } catch(e2){}
      } catch(e) {}
    }
  };

  // Upload array of data URLs SEQUENTIALLY (1개씩 순차 — 동시 업로드 금지, Lucas 직접 지시)
  // 동일 base64 캐시 — 같은 이미지 재사용 시 중복 업로드 방지 (CTO 지시)
  function uploadAll(dataUrls) {
    var total = dataUrls.length;
    var results = [];
    var success = 0, fail = 0;
    var uploadCache = {}; // dataUrl → uploaded URL 캐시
    var chain = Promise.resolve();
    for (var i = 0; i < total; i++) {
      (function(idx) {
        chain = chain.then(function() {
          topProgress.update(idx, total, success, fail);
          // 캐시 히트: 동일 dataUrl이 이미 업로드된 경우 재사용
          if (uploadCache[dataUrls[idx]]) {
            var cachedUrl = uploadCache[dataUrls[idx]];
            success++;
            results[idx] = cachedUrl;
            topProgress.update(idx+1, total, success, fail);
            log('upload ' + (idx+1) + '/' + total + ' CACHE HIT: ' + cachedUrl.substring(0,60));
            return;
          }
          // null dataUrl → filePath fallback에서 처리 (fn 매핑 실패 시)
          if (!dataUrls[idx]) {
            fail++;
            results[idx] = null;
            topProgress.update(idx+1, total, success, fail);
            log('upload ' + (idx+1) + '/' + total + ' SKIP(null→filePath fallback)');
            return;
          }
          log('uploading ' + (idx+1) + '/' + total + '...');
          return uploadDataUrl(dataUrls[idx])
            .then(function(j){
              var url = (j && j.url) ? j.url : null;
              if (url) { success++; uploadCache[dataUrls[idx]] = url; } else fail++;
              results[idx] = url;
              topProgress.update(idx+1, total, success, fail);
              log('upload ' + (idx+1) + '/' + total + (url ? ' OK: ' + url.substring(0,60) : ' FAIL'));
            })
            .catch(function(e){
              fail++;
              results[idx] = null;
              topProgress.update(idx+1, total, success, fail);
              warn('upload ' + (idx+1) + '/' + total + ' ERROR', e);
            });
        });
      })(i);
    }
    return chain.then(function() {
      topProgress.done(total, success, fail);
      return results;
    });
  }

  // Replace file:/// img srcs in-place with uploaded URLs (preserving position)
  function replaceFileImgsInPlace(html, uploadedUrls) {
    var container = document.createElement('div');
    container.innerHTML = html;
    var fileImgs = [];
    var allImgs = container.querySelectorAll('img');
    for (var i = 0; i < allImgs.length; i++) {
      var src = allImgs[i].getAttribute('src') || '';
      if (/^file:\/\//i.test(src)) fileImgs.push(allImgs[i]);
    }
    log('file:/// imgs in HTML:', fileImgs.length, '| uploaded URLs:', uploadedUrls.length);
    for (var j = 0; j < fileImgs.length; j++) {
      if (j < uploadedUrls.length && uploadedUrls[j]) {
        fileImgs[j].setAttribute('src', uploadedUrls[j]);
        fileImgs[j].style.maxWidth = '100%';
      } else {
        // No image data for this slot - remove the broken img
        fileImgs[j].parentNode.removeChild(fileImgs[j]);
      }
    }
    // Also clean up background-image:url(file:...)
    var allEls = container.querySelectorAll('*');
    for (var k = 0; k < allEls.length; k++) {
      var style = allEls[k].getAttribute('style') || '';
      if (/url\(.*?file:/i.test(style)) {
        allEls[k].setAttribute('style', style.replace(/url\((['"])?.*?file:[^)]*\)/gi, 'none'));
      }
    }
    return container.innerHTML;
  }

  document.addEventListener('paste', function(event) {
    if (BUSY) { event.preventDefault(); return; }

    var cd = event.clipboardData;
    if (!cd) return;

    var clipHTML = '';
    var clipRTF = '';
    var clipText = '';
    try { clipHTML = cd.getData('text/html') || ''; } catch(e){}
    try { clipRTF = cd.getData('text/rtf') || ''; } catch(e){}
    try { clipText = cd.getData('text/plain') || ''; } catch(e){}

    // Collect image file items
    var imageFiles = [];
    var items = cd.items || [];
    for (var i = 0; i < items.length; i++) {
      if (items[i].type && items[i].type.indexOf('image') === 0) {
        var f = items[i].getAsFile();
        if (f) imageFiles.push(f);
      }
    }

    var hasFileUrls = /file:\/\//i.test(clipHTML);
    var hasDataImages = /data:image\//i.test(clipHTML);

    log('paste detected', {
      imageFiles: imageFiles.length,
      htmlLen: clipHTML.length,
      rtfLen: clipRTF.length,
      hasFileUrls: hasFileUrls,
      hasDataImages: hasDataImages
    });

    // 클립보드 분석 데이터 서버 전송 — 개발자 진단용 (Lucas 직접 지시)
    (function sendClipboardLog() {
      try {
        var fileImgTagCount = (clipHTML.match(/<img\b[^>]*\bsrc\s*=\s*['"]?file:\/\//gi) || []).length;
        var sourceA = (clipHTML.match(/data:image\/[a-zA-Z0-9.+-]+;base64,/g) || []).length;
        var sourceB_raw = (clipHTML.match(/"bidt"\s*:/g) || []).length; // HWP JSON bidt 키 간이카운트
        var sourceC_pict = (clipRTF.match(/\\pict/g) || []).length;
        var clipTypes = [];
        try { for (var ti = 0; ti < items.length; ti++) clipTypes.push(items[ti].type); } catch(e) {}
        var fileUrlNames = [];
        var fre2 = /<img\b[^>]*\bsrc\s*=\s*["']?(file:\/\/\/[^"'\s>]+)/gi; var fm2;
        while ((fm2 = fre2.exec(clipHTML)) !== null) fileUrlNames.push(fm2[1].split('/').pop());
        var payload = {
          htmlLen: clipHTML.length,
          rtfLen: clipRTF.length,
          fileImgCount: fileImgTagCount,
          sourceA_htmlDataImg: sourceA,
          sourceB_hwpJsonBidt: sourceB_raw,
          sourceC_rtfPict: sourceC_pict,
          sourceD_clipFiles: imageFiles.length,
          clipTypes: clipTypes,
          fileUrls: fileUrlNames.slice(0, 20)
        };
        fetch('/api/log/clipboard', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).catch(function() {});
      } catch (ex) {}
    })();

    // CASE 1: Direct image blobs in clipboard (screenshot, image copy) — 순차 업로드
    if (imageFiles.length && !hasFileUrls) {
      event.preventDefault();
      BUSY = true;
      var totalBlobs = imageFiles.length;
      var blobSuc = 0, blobFail = 0;
      var ov = showOverlay('이미지 ' + totalBlobs + '개 업로드 중…');
      var blobResults = [];
      var blobChain = Promise.resolve();
      for (var fi = 0; fi < imageFiles.length; fi++) {
        (function(idx) {
          blobChain = blobChain.then(function() {
            topProgress.update(idx, totalBlobs, blobSuc, blobFail);
            return uploadBlob(imageFiles[idx], imageFiles[idx].name || 'pasted.png')
              .then(function(j){
                var url = (j && j.url) ? j.url : null;
                if (url) blobSuc++; else blobFail++;
                blobResults[idx] = url;
                topProgress.update(idx+1, totalBlobs, blobSuc, blobFail);
              })
              .catch(function(){
                blobFail++;
                blobResults[idx] = null;
                topProgress.update(idx+1, totalBlobs, blobSuc, blobFail);
              });
          });
        })(fi);
      }
      blobChain.then(function() {
        var html = '';
        for (var u = 0; u < blobResults.length; u++) {
          if (blobResults[u]) html += '<img src="' + blobResults[u] + '" style="max-width:100%;" alt="pasted-image" />';
        }
        if (html) insertHTML(html);
        topProgress.done(totalBlobs, blobSuc, blobFail);
        removeOverlay();
        BUSY = false;
        log('blob upload done', blobResults.filter(Boolean).length, 'images');
      });
      return;
    }

    // CASE 2: HTML contains data:image (inline base64 paste)
    if (hasDataImages && !hasFileUrls) {
      event.preventDefault();
      BUSY = true;
      var duList = collectDataUrls(clipHTML);
      if (!duList.length) { BUSY = false; return; }
      var ov2 = showOverlay('이미지 ' + duList.length + '개 업로드 중…');
      topProgress.update(0, duList.length, 0, 0);
      uploadAll(duList).then(function(urls) {
        var result = clipHTML;
        for (var d = 0; d < duList.length; d++) {
          if (urls[d]) {
            var escaped = duList[d].replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            result = result.replace(new RegExp(escaped, 'g'), urls[d]);
          }
        }
        insertHTML(result);
        removeOverlay();
        BUSY = false;
        log('data:URL upload done', urls.filter(Boolean).length, 'images');
      });
      return;
    }

    // CASE 3: HWP paste - file:/// URLs (main target!)
    if (hasFileUrls) {
      event.preventDefault();
      BUSY = true;
      var ov3 = showOverlay('HWP 이미지 추출 및 업로드 중…');
      log('HWP paste: extracting images from clipboard data');

      // Count file:/// img tags in HTML to know how many we need
      var fileImgCount = (clipHTML.match(/<img\b[^>]*\bsrc\s*=\s*['"]?file:\/\//gi) || []).length;
      log('file:/// img tags in HTML:', fileImgCount);

      // Try multiple extraction methods — 가장 많이 추출한 소스 사용
      var htmlDus = collectDataUrls(clipHTML);
      log('source A (data:image in HTML):', htmlDus.length);

      var hwpDus = collectFromHwpJson(clipHTML);
      log('source B (HWP JSON):', hwpDus.length);

      var rtfDus = collectFromRTF(clipRTF);
      log('source C (RTF \\pict):', rtfDus.length);

      if (imageFiles.length) {
        log('source D (clipboard files):', imageFiles.length);
      }

      // 클립보드 분석 데이터 서버 전송 — Lucas 직접 지시
      try {
        var fileUrlList = [];
        var fuRe = /<img\b[^>]*\bsrc\s*=\s*["']?(file:\/\/\/[^"'\s>]+)/gi;
        var fuM;
        while ((fuM = fuRe.exec(clipHTML)) !== null) fileUrlList.push(fuM[1].split('/').pop());
        // HWP JSON 메타데이터 (base64 데이터 제외)
        var hwpMeta = null;
        try {
          var jm = clipHTML.match(/<!--\[data-hwpjson\]\s*(\{[\s\S]*?\})\s*-->/i);
          if (jm) {
            var jr = JSON.parse(jm[1]);
            var jBidt = {};
            var jSr = [];
            var jSeen = {};
            (function jCollect(o) {
              if (!o || typeof o !== 'object') return;
              if (o.bidt && typeof o.bidt === 'object') {
                for (var k in o.bidt) jBidt[k] = typeof o.bidt[k] === 'string' ? o.bidt[k].length : 0;
              }
              if (typeof o.bi === 'string' && !jSeen[o.bi]) { jSr.push(o.bi); jSeen[o.bi] = true; }
              if (Array.isArray(o.bi)) {
                for (var ii = 0; ii < o.bi.length; ii++) {
                  var it = o.bi[ii];
                  if (it && typeof it.sr === 'string' && !jSeen[it.sr]) { jSr.push(it.sr); jSeen[it.sr] = true; }
                }
              }
              for (var kk in o) if (Object.prototype.hasOwnProperty.call(o, kk)) jCollect(o[kk]);
            })(jr);
            hwpMeta = { bidtKeys: jBidt, srOrder: jSr, matched: hwpDus.length, total: jSr.length };
          }
        } catch(e2) {}
        fetch('/api/log/clipboard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            htmlLen: clipHTML.length,
            rtfLen: clipRTF.length,
            fileImgCount: fileImgCount,
            fileUrlNames: fileUrlList,
            hwpJsonImages: hwpDus.length,
            rtfImages: rtfDus.length,
            htmlDataImages: htmlDus.length,
            clipboardFiles: imageFiles.length,
            hwpMeta: hwpMeta
          })
        }).catch(function(){});
      } catch(e3) {}

      // 소스 선택: HWP JSON 우선 (PNG/JPEG 정상 포맷)
      // RTF는 WMF/EMF 메타파일을 반환하여 Cloudinary 400 에러 발생 — 보충용으로만 사용
      var allDataUrls = [];

      // 1순위: HWP JSON (정상 PNG/JPEG base64)
      if (hwpDus.length > 0) {
        allDataUrls = hwpDus.slice();
        log('primary source: HWP JSON (' + hwpDus.length + ' images)');
      }

      // 2순위: HTML inline data:image
      if (allDataUrls.length < fileImgCount && htmlDus.length > allDataUrls.length) {
        allDataUrls = htmlDus.slice();
        log('switched to HTML data:image source (' + htmlDus.length + ' images)');
      }

      // RTF 보충: HWP JSON이 부족하면 RTF에서 추가 (단, 유효 이미지만)
      if (allDataUrls.length < fileImgCount && rtfDus.length > 0) {
        var supplemented = 0;
        for (var ri = 0; ri < rtfDus.length && allDataUrls.length < fileImgCount; ri++) {
          // WMF/EMF 필터: data:image 크기가 너무 작으면(< 10KB base64) 스킵 — WMF 벡터 placeholder
          var b64Len = rtfDus[ri].length - rtfDus[ri].indexOf(',') - 1;
          if (b64Len < 13000) { // ~10KB raw
            log('RTF image', ri+1, 'skipped (too small:', Math.round(b64Len*3/4), 'bytes, likely WMF placeholder)');
            continue;
          }
          allDataUrls.push(rtfDus[ri]);
          supplemented++;
        }
        if (supplemented > 0) log('RTF supplemented', supplemented, 'additional images');
      }

      log('final image count:', allDataUrls.length, '/', fileImgCount, 'file:/// tags');
      if (allDataUrls.length < fileImgCount) {
        warn('image shortfall:', fileImgCount - allDataUrls.length, '— some images may be missing');
      }

      // file:/// URL 목록 추출 (순서대로)
      var fileUrls = [];
      var fileUrlRe = /<img\b[^>]*\bsrc\s*=\s*["']?(file:\/\/\/[^"'\s>]+)/gi;
      var fum;
      while ((fum = fileUrlRe.exec(clipHTML)) !== null) {
        fileUrls.push(fum[1]);
      }
      log('file:/// URLs extracted:', fileUrls.length, fileUrls.map(function(u){ return u.split('/').pop(); }));

      if (fileUrls.length > 0) {
        // ★ 순서 보장 전략: 각 file:/// img 태그를 HTML 순서대로 base64(dataUrl) 순차 업로드
        // filePath(서버 로컬 파일시스템 접근) 제거 — 설계 결함. base64만 사용.
        var totalToUpload = fileUrls.length;
        log('uploading', totalToUpload, 'images (base64 dataUrl, sequential order guaranteed)');
        topProgress.update(0, totalToUpload, 0, 0);

        var finalUrls = [];
        var fpSuc = 0, fpFail = 0;
        var uploadChain = Promise.resolve();

        for (var fi = 0; fi < fileUrls.length; fi++) {
          (function(slot, fUrl) {
            uploadChain = uploadChain.then(function() {
              topProgress.update(slot, totalToUpload, fpSuc, fpFail);
              log('slot ' + slot + '/' + totalToUpload + ': ' + fUrl.split('/').pop());

              // base64 dataUrl 순차 업로드 (순서 보장 — slot 인덱스 기반)
              if (slot < allDataUrls.length && allDataUrls[slot]) {
                return uploadDataUrl(allDataUrls[slot]).then(function(j2) {
                  var u2 = (j2 && j2.url) ? j2.url : null;
                  if (u2) { fpSuc++; finalUrls[slot] = u2; }
                  else { fpFail++; finalUrls[slot] = null; }
                  topProgress.update(slot+1, totalToUpload, fpSuc, fpFail);
                  log('slot ' + slot + ' base64 ' + (u2 ? 'OK: ' + u2.substring(0,60) : 'FAIL'));
                }).catch(function(e) {
                  fpFail++;
                  finalUrls[slot] = null;
                  topProgress.update(slot+1, totalToUpload, fpSuc, fpFail);
                  warn('slot ' + slot + ' ERROR', e);
                });
              }
              fpFail++;
              finalUrls[slot] = null;
              topProgress.update(slot+1, totalToUpload, fpSuc, fpFail);
              log('slot ' + slot + ' no base64 data available');
            });
          })(fi, fileUrls[fi]);
        }

        uploadChain.then(function() {
          var totalSuccess = finalUrls.filter(Boolean).length;
          log('final upload results:', totalSuccess, '/', fileUrls.length);

          // Replace file:/// img srcs in their original positions
          var result = replaceFileImgsInPlace(clipHTML, finalUrls);
          insertHTML(result);
          topProgress.done(fileUrls.length, totalSuccess, fileUrls.length - totalSuccess);
          removeOverlay();
          BUSY = false;
          log('HWP upload done', totalSuccess, 'images in-place');
        });
      } else if (imageFiles.length) {
        // Fall back to blob upload — 순차 1건씩
        var bfTotal = imageFiles.length, bfSuc = 0, bfFail = 0;
        var bfResults = [];
        topProgress.update(0, bfTotal, 0, 0);
        var bfChain = Promise.resolve();
        for (var bi = 0; bi < imageFiles.length; bi++) {
          (function(idx) {
            bfChain = bfChain.then(function() {
              topProgress.update(idx, bfTotal, bfSuc, bfFail);
              return uploadBlob(imageFiles[idx], 'hwp-image.png')
                .then(function(j){
                  var url = (j && j.url) ? j.url : null;
                  if (url) bfSuc++; else bfFail++;
                  bfResults[idx] = url;
                  topProgress.update(idx+1, bfTotal, bfSuc, bfFail);
                })
                .catch(function(){
                  bfFail++;
                  bfResults[idx] = null;
                  topProgress.update(idx+1, bfTotal, bfSuc, bfFail);
                });
            });
          })(bi);
        }
        bfChain.then(function() {
          var result = replaceFileImgsInPlace(clipHTML, bfResults);
          insertHTML(result);
          topProgress.done(bfTotal, bfSuc, bfFail);
          removeOverlay();
          BUSY = false;
          log('HWP blob fallback done', bfResults.filter(Boolean).length, 'images in-place');
        });
      } else {
        // No image data found - remove broken file:/// imgs, keep text
        warn('HWP paste: no image data found in clipboard');
        var result2 = replaceFileImgsInPlace(clipHTML, []);
        if (!result2.trim() && clipText) result2 = clipText;
        insertHTML(result2);
        removeOverlay();
        BUSY = false;
      }
      return;
    }

    // CASE 4: Normal text/html paste - let browser handle it
    // (do nothing, default behavior)
  });

  log('paste handler attached to editor input area');
})();
</script>
</html>
